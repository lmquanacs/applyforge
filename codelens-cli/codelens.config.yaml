output_file: "project_overview.md"
project_hint: null  # auto-detect; override with e.g. "spring-boot"
ignore_patterns:
  - "target/**"
  - "build/**"
  - ".idea/**"
  - ".git/**"
  - "venv/**"
  - "__pycache__/**"

agents:
  coordinator:
    provider: "anthropic"
    model: "claude-opus-4-5"
    temperature: 0.2

  worker:
    provider: "anthropic"
    model: "claude-haiku-4-5"
    temperature: 0.1
    max_concurrent_workers: 5
