# Model Settings
model:
  default: "gpt-4o"
  fallback: "claude-3-5-sonnet-20241022"
  temperature: 0.1

# Token & Cost Management
tokens:
  max_input_limit: 16000
  max_output_limit: 2000
  warn_cost_threshold: 0.10

# Application Settings
app:
  log_usage: true
  usage_db_path: "~/.config/career-ai/usage.db"
  max_cover_letter_words: 120
  chat_session_id: "default"
  vault_top_k: 8
  working_dir: "~/Documents/career-ai"   # default directory for CV files and outputs
  default_cv_path: ""                     # set to a specific file to skip typing it every time
